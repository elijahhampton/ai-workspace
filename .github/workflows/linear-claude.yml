name: Linear Claude Code

on:
  repository_dispatch:
    types: [linear-claude-trigger]

jobs:
  claude-implementation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      checks: write
      deployments: write
      id-token: write
      packages: write
      pages: write
      repository-projects: write
      security-events: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep,LS,mcp__github__create_pull_request,mcp__github__create_branch,mcp__github__push_files,mcp__github__get_file_contents,mcp__github__list_branches,mcp__github__search_code"
          prompt: |
            Linear issue: ${{ github.event.client_payload.issue_title }}
            URL: ${{ github.event.client_payload.issue_url }}

            Please implement the changes described above and open a pull request when done.