name: Linear Claude Code

on:
  repository_dispatch:
    types: [linear-claude-trigger]

jobs:
  claude-implementation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      checks: write
      deployments: write
      id-token: write
      packages: write
      pages: write
      repository-projects: write
      security-events: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: |
            --dangerously-skip-permissions
            --model claude-sonnet-4-6
          prompt: |
            Linear issue: ${{ github.event.client_payload.issue_title }}
            URL: ${{ github.event.client_payload.issue_url }}
            
            Description:
            ${{ github.event.client_payload.issue_description }}

            Please implement the changes described above. Follow the conventions in CLAUDE.md. Use the PULL_REQUEST_TEMPLATE.md file when opening the pull request.