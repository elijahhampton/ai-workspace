name: Linear Claude Code

on:
  repository_dispatch:
    types: [linear-claude-trigger]

jobs:
  claude-implementation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Linear issue: ${{ github.event.client_payload.issue_title }}
            URL: ${{ github.event.client_payload.issue_url }}
            
            Please implement the changes described above and open a pull request when done.